<div class="dialog-wrapper">
 <h2 mat-dialog-title class="dialog-title">
  <span class="brand-icon">
    <mat-icon>{{ isNew ? 'add_box' : 'edit_square' }}</mat-icon>
  </span> 

  <ng-container *ngIf="isNew; else editText">
  <span class="edit-title">  Schedule New Task</span>
  </ng-container>

  <ng-template #editText>
    <span class="edit-title">Edit Task Details</span>
  </ng-template>
</h2>
  <!-- Attach Reactive Form -->
  <form [formGroup]="taskForm" (ngSubmit)="save()" class="dialog-content">
    
    <div class="form-group" *ngIf="isNew">
      <label>Project Workspace</label>
      <select formControlName="project_id" [class.invalid]="taskForm.get('project_id')?.invalid && taskForm.get('project_id')?.touched">
        <option value="" disabled>Select a Workspace...</option>
        <option *ngFor="let p of projects" [value]="p.id">{{p.name}}</option>
      </select>
      <small class="error-text" *ngIf="taskForm.get('project_id')?.invalid && taskForm.get('project_id')?.touched">Workspace is required</small>
    </div>

    <div class="form-group">
      <label>Issue Title</label>
      <input type="text" formControlName="title" [class.invalid]="taskForm.get('title')?.invalid && taskForm.get('title')?.touched" [placeholder]="isNew ? 'What needs to be done?' : ''">
      <small class="error-text" *ngIf="taskForm.get('title')?.errors?.['required'] && taskForm.get('title')?.touched">Title is required</small>
      <small class="error-text" *ngIf="taskForm.get('title')?.errors?.['minlength'] && taskForm.get('title')?.touched">Title must be at least 3 characters</small>
    </div>

    <div class="form-group" *ngIf="isNew">
      <label>Description</label>
      <input type="text" formControlName="description" placeholder="Details...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select formControlName="status_id">
          <option [ngValue]="1">To Do</option>
          <option [ngValue]="2">In Progress</option>
          <option [ngValue]="3">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select formControlName="priority_id">
          <option [ngValue]="1">Low</option>
          <option [ngValue]="2">Medium</option>
          <option [ngValue]="3">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Story Points</label>
        <input type="number" formControlName="story_points" placeholder="e.g. 3">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" formControlName="start_date">
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" formControlName="due_date">
      </div>
    </div>

    <div class="form-group" *ngIf="isNew">
      <label>Assign To</label>
      <select multiple formControlName="assignees" class="multi-select">
        <option *ngFor="let u of users" [value]="u.id">{{u.first_name || u.last_name || u.username}}</option>
      </select>
    </div>

  </form>

  <div mat-dialog-actions class="dialog-actions">
    <button class="cancel-btn" type="button" (click)="close()" [disabled]="isSaving">Cancel</button>
    <button class="primary-btn" type="button" (click)="save()" [disabled]="isSaving">
      <mat-icon class="spinner" *ngIf="isSaving">autorenew</mat-icon>
      {{ isSaving ? 'Saving...' : (isNew ? 'Create Task' : 'Save Changes') }}
    </button>
  </div>
</div>
