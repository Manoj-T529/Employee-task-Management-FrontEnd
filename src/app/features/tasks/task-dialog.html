<div class="dialog-wrapper split-layout">
  
  <!-- LEFT COLUMN: Task Details -->
  <div class="dialog-main">
    <h2 mat-dialog-title class="dialog-title">
      <span class="brand-icon"><mat-icon>{{ isNew ? 'add_box' : 'edit_square' }}</mat-icon></span> 
      <span *ngIf="isNew">Schedule New Task</span>
  <span *ngIf="!isNew" class="task-id">
    {{ task.id | slice:0:8 }}
  </span>
    </h2>

    <div mat-dialog-content class="dialog-content">

        <div class="form-group" *ngIf="isNew">
        <label>Workspace / Project <span style="color: #ef4444;">*</span></label>
        <select [(ngModel)]="task.project_id" style="width: 100%; padding: 10px 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; outline: none; margin-bottom: 12px;">
          <option [ngValue]="undefined" disabled selected>Select a workspace...</option>
          <option *ngFor="let p of projects" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Issue Title</label>
        <input type="text" [(ngModel)]="task.title" [placeholder]="isNew ? 'What needs to be done?' : ''">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="task.description" placeholder="Add technical details..." rows="4" class="custom-textarea"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group"><label>Status</label><select [(ngModel)]="task.status_id"><option [value]="1">To Do</option><option [value]="2">In Progress</option><option [value]="3">Done</option></select></div>
        <div class="form-group"><label>Priority</label><select [(ngModel)]="task.priority_id"><option [value]="1">Low</option><option [value]="2">Medium</option><option [value]="3">High</option></select></div>
        <div class="form-group"><label>Story Points</label><input type="number" [(ngModel)]="task.story_points" placeholder="e.g. 3"></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>Start Date</label><input type="date" [(ngModel)]="task.start_date"></div>
        <div class="form-group"><label>Due Date</label><input type="date" [(ngModel)]="task.due_date"></div>
      </div>

      <div class="form-group">
        <label>Assign To</label>
        <mat-select multiple [(ngModel)]="task.assignees" class="custom-mat-select" placeholder="Select Team Members...">
          <mat-option *ngFor="let u of users" [value]="u.id">{{u.first_name || u.last_name || u.username}}</mat-option>
        </mat-select>
      </div>
    </div>

    <div mat-dialog-actions class="dialog-actions">
        <div *ngIf="isNew"></div>
      <div style="display: flex; gap: 12px;">
        <button class="cancel-btn" (click)="close()">Cancel</button>
        <button class="primary-btn" (click)="save()">{{ isNew ? 'Create Task' : 'Save Changes' }}</button>
      </div>
    </div>
  </div>
    </div>
