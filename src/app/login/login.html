<div class="premium-login-layout">

  <!-- Ambient Glows -->
  <div class="ambient-glow glow-indigo"></div>
  <div class="ambient-glow glow-purple"></div>

  <div class="login-wrapper animate-fade-up">
    
    <!-- Brand Header -->
    <div class="brand-header" (click)="goToHome()">
      <div class="brand-icon"><mat-icon>layers</mat-icon></div>
      <span class="brand-name">TaskFlow</span>
    </div>

    <!-- Login Card -->
    <div class="premium-form-card">
      <div class="card-header">
        <h2>Welcome back</h2>
        <p class="subtitle">Enter your credentials to access your workspace.</p>
      </div>

      <form (ngSubmit)="login()">
        
        <!-- EMAIL -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper" [class.disabled]="isLoading">
            <mat-icon class="input-icon">mail</mat-icon>
            <input 
              type="email" 
              [(ngModel)]="email" 
              name="email" 
              placeholder="name@company.com" 
              required 
              [disabled]="isLoading"
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper" [class.disabled]="isLoading">
            <mat-icon class="input-icon">lock</mat-icon>
            <input 
              type="password" 
              [(ngModel)]="password" 
              name="password" 
              placeholder="••••••••" 
              required 
              [disabled]="isLoading"
            />
          </div>
        </div>

        <!-- ERROR BANNER -->
        <div class="error-banner animate-fade-in" *ngIf="errorMessage">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="primary-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="loading-state">
            <mat-icon class="spinner">autorenew</mat-icon> Signing in...
          </span>
        </button>

      </form>
    </div>

    <!-- Back to Home -->
    <button class="back-link" (click)="goToHome()">
      <mat-icon>arrow_back</mat-icon> Back to Home
    </button>

  </div>
</div>
